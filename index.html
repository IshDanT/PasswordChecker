<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Random Tracker</title>
    <style>
        body { background: #000; color: #0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; margin: 0; text-align: center; }
        #code { font-size: 150px; font-weight: bold; text-shadow: 0 0 20px #0f0; }
        #stats { color: #050; font-size: 22px; margin-top: 10px; }
        .hint { color: #333; margin-top: 30px; font-size: 14px; }
        button { background: #111; color: #333; border: 1px solid #222; padding: 5px 10px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="code">----</div>
    <div id="stats">Press SPACE to Start</div>
    <div class="hint">Numbers are random and will not repeat.</div>
    <button onclick="hardReset()">Hard Reset</button>

    <script>
        // Track which numbers have been used using a Set for speed
        let usedCodes = new Set(JSON.parse(localStorage.getItem('used_codes')) || []);
        let currentCode = localStorage.getItem('current_display_code') || "----";

        const display = document.getElementById('code');
        const stats = document.getElementById('stats');

        function updateUI() {
            display.innerText = currentCode;
            stats.innerText = `Attempt: ${usedCodes.size} / 10,000`;
        }

        function getNextRandom() {
            if (usedCodes.size >= 10000) {
                currentCode = "DONE";
                updateUI();
                return;
            }

            let found = false;
            let next;
            
            // Keep picking until we find a number we haven't used
            while (!found) {
                next = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                if (!usedCodes.has(next)) {
                    found = true;
                }
            }

            currentCode = next;
            usedCodes.add(next);
            
            // Save progress
            localStorage.setItem('used_codes', JSON.stringify(Array.from(usedCodes)));
            localStorage.setItem('current_display_code', currentCode);
            
            updateUI();
        }

        function hardReset() {
            if (confirm("Reset everything?")) {
                localStorage.clear();
                usedCodes = new Set();
                currentCode = "----";
                updateUI();
            }
        }

                e.preventDefault
