<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saved Passcode Tracker</title>
    <style>
        body { background: #111; color: #0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; margin: 0; text-align: center; }
        #code { font-size: 150px; font-weight: bold; text-shadow: 0 0 25px #0f0; margin: 0; }
        #stats { margin-top: 10px; color: #888; font-size: 24px; }
        .controls { margin-top: 40px; }
        .instruction { color: #555; font-size: 18px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        button { padding: 10px 20px; cursor: pointer; background: #222; color: #666; border: 1px solid #444; border-radius: 5px; font-family: inherit; }
        button:hover { background: #333; color: #fff; }
    </style>
</head>
<body>

    <div id="code">LOADING...</div>
    <div id="stats">Checking saved progress...</div>
    
    <div class="controls">
        <div class="instruction">Press <b>SPACEBAR</b> to advance</div>
        <button onclick="resetEverything()">Reset All Progress</button>
    </div>

    <script>
        let pool = [];
        let currentIndex = 0;

        function loadData() {
            const savedPool = localStorage.getItem('passcode_pool');
            const savedIndex = localStorage.getItem('passcode_index');

            if (savedPool) {
                pool = JSON.parse(savedPool);
                currentIndex = parseInt(savedIndex) || 0;
                displayCurrent();
            } else {
                generateNewPool();
            }
        }

        function generateNewPool() {
            pool = Array.from({length: 10000}, (_, i) => i.toString().padStart(4, '0'));
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            currentIndex = 0;
            saveData();
            displayCurrent();
        }

        function saveData() {
            localStorage.setItem('passcode_pool', JSON.stringify(pool));
            localStorage.setItem('passcode_index', currentIndex.toString());
        }

        function displayCurrent() {
            if (currentIndex < pool.length) {
                document.getElementById('code').innerText = pool[currentIndex];
                document.getElementById('stats').innerText = `Attempt: ${currentIndex + 1} / 10,000`;
            } else {
                document.getElementById('code').innerText = "DONE";
                document.getElementById('stats').innerText = "All codes tested.";
            }
        }

        function resetEverything() {
            if (confirm("Reset everything? This will generate a NEW random order.")) {
                localStorage.clear();
                generateNewPool();
            }
        }

        // UPDATED: Now listens specifically for the Spacebar
        window.addEventListener('keydown', (e) => {
            // Using e.code === "Space" to prevent scrolling down the page
            if (e.code === "Space") {
                e.preventDefault(); // This stops the window from jumping/scrolling
                if (currentIndex < pool.length - 1) {
                    currentIndex++;
                    saveData
