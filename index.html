<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fixed Passcode Tracker</title>
    <style>
        body { background: #000; color: #0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; margin: 0; text-align: center; cursor: pointer; }
        #code { font-size: 150px; font-weight: bold; text-shadow: 0 0 20px #0f0; pointer-events: none; }
        #stats { color: #050; font-size: 22px; margin-top: 10px; pointer-events: none; }
        .hint { color: #222; margin-top: 30px; font-size: 14px; pointer-events: none; }
        button { background: #111; color: #444; border: 1px solid #222; padding: 10px; cursor: pointer; margin-top: 40px; position: relative; z-index: 10; }
    </style>
</head>
<body onclick="getNextRandom()">

    <div id="code">----</div>
    <div id="stats">Tap Screen or Press SPACE</div>
    <div class="hint">Numbers are random and will not repeat.</div>
    
    <button onclick="event.stopPropagation(); hardReset();">Hard Reset</button>

    <script>
        let usedCodes = new Set(JSON.parse(localStorage.getItem('used_codes')) || []);
        let currentCode = localStorage.getItem('current_display_code') || "----";

        function updateUI() {
            document.getElementById('code').innerText = currentCode;
            document.getElementById('stats').innerText = `Attempt: ${usedCodes.size} / 10,000`;
        }

        function getNextRandom() {
            if (usedCodes.size >= 10000) {
                currentCode = "DONE";
                updateUI();
                return;
            }

            let next;
            do {
                next = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            } while (usedCodes.has(next));

            currentCode = next;
            usedCodes.add(next);
            
            localStorage.setItem('used_codes', JSON.stringify(Array.from(usedCodes)));
            localStorage.setItem('current_display_code', currentCode);
            updateUI();
        }

        function hardReset() {
            if (confirm("Reset everything?")) {
                localStorage.clear();
                usedCodes = new Set();
                currentCode = "----";
                updateUI();
            }
        }

        // Spacebar listener
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                getNextRandom();
            }
        });

        // Load saved state immediately
        updateUI();
    </script>
</body>
</html>
